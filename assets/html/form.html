<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="../css/flexbox-style.css">
</head>
<body>
    <a href="/index.html">Home</a>
    <p>Home work for CSS flexbox</p>
    <form >
        <div class="form-body">
<fieldset>
            <legend>Personal Info</legend>

            <div class="form_element">
                <label for="first_name">First Name</label>
                <input id="first_name" type="text">
            </div>

            <div class="form_element">
                <label for="last_name">Last Name</label>
                <input id="last_name" type="text">
            </div>

            <div class="form_element">
                <label for="date">Birthday</label>
                <input type="date" id="date">
            </div>

            <div class="form_element">
                <label>Gender</label>
                <input type="radio" name="gender" id="male"> <label for="male">Male</label>
                <input type="radio" name="gender" id="female"> <label for="female">Female</label>
            </div>

            <div class="form_element">
                <label for="exp">Drive experience</label>
                <select id="exp">
                    <option value="0">---</option>
                    <option value="1">expent</option>
                    <option value="3">more than 10g</option>
                    <option value="5">5-10</option>
                    <option value="5">2-5</option>
                    <option value="5">less than 2</option>
                    <option value="5">beginner</option>
                </select>
            </div>
        </fieldset>

        <fieldset>
            <legend>Contacts</legend>
            <div class="form_element">
                <label for="email">Email</label>
                <input type="email" id="email">
            </div>
            <div class="form_element">
                <label for="phone">Phone</label>
                <input type="tel" id="phone">
            </div>
            <div class="form_element">
                <label for="address">Address</label>
                <textarea id="address"></textarea>
            </div>
        </fieldset>


        <fieldset>
        <legend>Car Info</legend>

        <div class="form_element">
            <label for="brand">Brand</label>
            <select id="brand">
            <option value="">---</option>
            <option value="ford">Ford</option>
            <option value="toyota">Toyota</option>
            <option value="bmw">BMW</option>
            </select>
        </div>
        
        <div class="form_element">
            <label for="model">Model</label>

            <select id="model">
                <option value="">---</option>
                <option value="ford">Ford Focus</option>
                <option value="ford">Ford Mustang</option>
                <option value="toyota">Toyota Corolla</option>
                <option value="toyoya">Toyota Camry</option>
                <option value="bmw">BMW 3 Series</option>
                <option value="bmw">BMW X5</option>
                </select>
        </div>
        
        <div class="form_element">
            <label for="used">Used</label>
            <input type="checkbox" id="used">
        </div>
        
        <div class="form_element">
            <label>Color</label>    
                <input type="radio" name="color" id="red" checked> <label for="red">Red</label>
                <input type="radio" name="color" id="black"> <label for="black">Black</label>
                <input type="radio" name="color" id="blue"> <label for="blue">Blue</label>
                <input type="radio" name="color" id="white"> <label for="white">White</label>
                <input type="radio" name="color" id="grey"> <label for="grey">Grey</label>
        </div>
<div class="form_element price-row">
                    <label>Price</label>
                    <div class="range-container">
                        <input type="range" min="10" max="80" step="10" list="prices">
                        <datalist id="prices">
                            <option value="10" label="10"></option>
                            <option value="20" label="20"></option>
                            <option value="30" label="30"></option>
                            <option value="40" label="40"></option>
                            <option value="50" label="50"></option>
                            <option value="60" label="60"></option>
                            <option value="70" label="70"></option>
                            <option value="80" label="80"></option>
                        </datalist>
                    </div>
                </div>
            </fieldset>
        </div>

        <div class="form_buttons">
            <button type="reset">Cancel</button>
            <button type="submit">Ok</button>
        </div>
    </form>
</body>
</html>
