<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <a href="/index.html">Home</a>
    <form >

            <fieldset>

                <legend>Personal Info</legend>

        <div class="form_element">
            <label for="text">First Name</label>
            <input id="name">
        </div>

        <div class="form_element">
            <label for="text">Last Name</label>
            <input id="text">
        </div>

        <div class="form_element">
            <label for="date">Birthday</label>
            <input type="date" id="date">
        </div>

        <div class="form_element">
            <label>Gender</label>
            <input type="radio" name="gender" id="male"> <label for="male">Male</label>
            <input type="radio" name="gender" id="female"> <label for="male">Female</label>
        </div>

        <div class="form_element">
            <label for="date">Drive experience</label>
            <input type="number">
        </div>

        </fieldset>

        <fieldset>
        <legend>Contacts</legend>

        <div class="form_element">
            <label for="email">Email</label>
            <input type="email" id="email">
        </div>
        
        <div class="form_element">
            <label for="phone">Phone</label>
            <input type="tel" id="phone">
        </div>
        
        <div class="form_element">
            <label for="address">Address</label>
            <textarea id="address"></textarea>
        </div>
        </fieldset>


        <fieldset>
        <legend>Car Info</legend>

        <div class="form_element">
            <label for="brand">Brand</label>
            <select id="brand">
            <option value="">---</option>
            <option value="ford">Ford</option>
            <option value="toyota">Toyota</option>
            <option value="bmw">BMW</option>
            </select>
        </div>
        
        <div class="form_element">
            <label for="model">Model</label>

            <select id="model">
                <option value="">---</option>
                <option value="ford">Ford Focus</option>
                <option value="ford">Ford Mustang</option>
                <option value="toyota">Toyota Corolla</option>
                <option value="toyoya">Toyota Camry</option>
                <option value="bmw">BMW 3 Series</option>
                <option value="bmw">BMW X5</option>
                </select>
        </div>
        
        <div class="form_element">
            <label for="used">Used</label>
            <input type="checkbox" id="used">
        </div>
        
        <div class="form_element">
            <label>Color</label>
                <input type="radio" name="color" id="red" checked> <label for="red">Red</label>
                <input type="radio" name="color" id="black"> <label for="black">Black</label>
                <input type="radio" name="color" id="blue"> <label for="blue">Blue</label>
                <input type="radio" name="color" id="white"> <label for="white">White</label>
                <input type="radio" name="color" id="grey"> <label for="grey">Grey</label>
        </div>
        
        <div class="form_element">
            <label for="price">Price</label>
            <input type="range" id="price" min="0" max="100000">
        </div>

        </fieldset>
        <div class="form_buttons">
            <button type="button">Cancel</button>
            <button type="submit">Ok</button>
        </div>

    </form>
</body>
</html>
